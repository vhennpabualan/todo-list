<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Todo List</title>
  <script type="module" crossorigin src="/todo-list/assets/index-Bys-H3mB.js"></script>
  <link rel="stylesheet" crossorigin href="/todo-list/assets/index-vxPS6FOB.css">
</head>
<body class="bg-dark-950 text-white">
  <div id="app" class="flex flex-col md:flex-row h-screen">
    <!-- Mobile Menu Button -->
    <button id="mobileMenuBtn" class="md:hidden bg-dark-900 border-b border-dark-700 p-4 flex items-center gap-2">
      <span class="text-2xl">☰</span>
      <span class="font-bold">TaskFlow</span>
    </button>

    <!-- Sidebar -->
    <aside id="sidebar" class="hidden md:flex md:flex-col w-full md:w-64 bg-dark-900 border-r border-dark-700 p-6 overflow-y-auto absolute md:static top-0 left-0 h-full md:h-auto z-50">
      <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center">
            <input type="checkbox" checked class="w-4 h-4">
          </div>
          <h1 class="text-2xl font-bold">TaskFlow</h1>
        </div>
        <button id="closeSidebarBtn" class="md:hidden text-2xl">✕</button>
      </div>

      <!-- Navigation -->
      <nav class="space-y-1 mb-8">
        <button class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition font-medium" data-filter="today">
          <span class="text-lg">📅</span>
          <span>Today</span>
        </button>
        <button class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-dark-300 hover:bg-dark-800 transition" data-filter="inbox">
          <span class="text-lg">📋</span>
          <span>Inbox</span>
        </button>
        <button class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-dark-300 hover:bg-dark-800 transition" data-filter="next7">
          <span class="text-lg">📆</span>
          <span>Next 7 Days</span>
        </button>
      </nav>

      <!-- Projects -->
      <div class="mb-8">
        <h2 class="text-sm font-semibold text-dark-400 mb-3 px-4">Projects</h2>
        <div class="space-y-2">
          <button class="project-item w-full flex items-center gap-3 px-4 py-2 rounded-lg text-dark-300 hover:bg-dark-800 transition text-left" data-project="app-dev">
            📱 App Development
          </button>
          <button class="project-item w-full flex items-center gap-3 px-4 py-2 rounded-lg text-dark-300 hover:bg-dark-800 transition text-left" data-project="portfolio">
            🌐 Portfolio Site
          </button>
          <button class="project-item w-full flex items-center gap-3 px-4 py-2 rounded-lg text-dark-300 hover:bg-dark-800 transition text-left" data-project="marketing">
            📢 Marketing
          </button>
        </div>
      </div>

      <!-- Labels -->
      <div class="mb-8">
        <h2 class="text-sm font-semibold text-dark-400 mb-3 px-4">Labels</h2>
        <div class="space-y-2">
          <label class="flex items-center gap-3 px-4 py-2 rounded-lg text-dark-300 hover:bg-dark-800 transition cursor-pointer">
            <input type="checkbox" class="w-4 h-4">
            <span>Work</span>
          </label>
          <label class="flex items-center gap-3 px-4 py-2 rounded-lg text-dark-300 hover:bg-dark-800 transition cursor-pointer">
            <input type="checkbox" class="w-4 h-4">
            <span>Personal</span>
          </label>
          <label class="flex items-center gap-3 px-4 py-2 rounded-lg text-dark-300 hover:bg-dark-800 transition cursor-pointer">
            <input type="checkbox" class="w-4 h-4">
            <span>Urgent</span>
          </label>
        </div>
      </div>

      <!-- Completed -->
      <button class="nav-item w-full flex items-center gap-3 px-4 py-2 rounded-lg text-dark-300 hover:bg-dark-800 transition text-left" data-filter="completed">
        ✓ Completed
      </button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <!-- Header -->
      <header class="bg-gradient-to-r from-cyan-600 to-emerald-600 px-4 md:px-8 py-6 md:py-8 border-b border-dark-700">
        <p class="text-xs md:text-sm text-white opacity-80">Today's Focus - Monday,</p>
        <h1 class="text-2xl md:text-4xl font-bold text-white">March 15, 2026</h1>
      </header>

      <!-- Stats -->
      <div class="grid grid-cols-2 md:grid-cols-2 gap-3 md:gap-4 px-4 md:px-8 py-4 md:py-6 bg-dark-900 border-b border-dark-700">
        <div class="flex items-center gap-3 p-3 md:p-4 bg-dark-800 rounded-lg border border-dark-700">
          <div class="bg-blue-600 rounded-lg p-2 md:p-3 flex-shrink-0">
            <span class="text-xl md:text-2xl">📊</span>
          </div>
          <div class="min-w-0">
            <p class="text-dark-400 text-xs md:text-sm">Active Tasks</p>
            <p class="text-lg md:text-2xl font-bold" id="activeTasks">0</p>
          </div>
        </div>
        <div class="flex items-center gap-3 p-3 md:p-4 bg-dark-800 rounded-lg border border-dark-700">
          <div class="bg-emerald-600 rounded-lg p-2 md:p-3 flex-shrink-0">
            <span class="text-xl md:text-2xl">✓</span>
          </div>
          <div class="min-w-0">
            <p class="text-dark-400 text-xs md:text-sm">Completed</p>
            <p class="text-lg md:text-2xl font-bold" id="completedTasks">0</p>
          </div>
        </div>
      </div>

      <!-- Tasks List -->
      <div class="flex-1 overflow-y-auto px-4 md:px-8 py-4 md:py-6">
        <div class="space-y-3" id="tasksList">
          <!-- Tasks will be rendered here -->
        </div>
      </div>

      <!-- Add Task -->
      <div class="px-4 md:px-8 py-4 md:py-6 bg-dark-900 border-t border-dark-700">
        <div class="flex flex-col gap-3">
          <div class="flex flex-col sm:flex-row gap-2 sm:gap-3">
            <input type="text" id="newTaskInput" placeholder="Add a new task..." class="flex-1 bg-dark-800 border border-dark-700 rounded-lg px-4 py-2.5 md:py-3 text-white placeholder-dark-400 focus:border-blue-500 focus:shadow-lg focus:shadow-blue-500/20 text-sm md:text-base transition">
            <select id="projectSelect" class="bg-dark-800 border border-dark-700 rounded-lg px-3 md:px-4 py-2.5 md:py-3 text-white focus:border-blue-500 focus:shadow-lg focus:shadow-blue-500/20 text-sm md:text-base transition">
              <option value="">Project</option>
              <option value="app-dev">App Development</option>
              <option value="portfolio">Portfolio Site</option>
              <option value="marketing">Marketing</option>
            </select>
          </div>
          <div class="flex flex-col sm:flex-row gap-2 sm:gap-3">
            <select id="prioritySelect" class="flex-1 sm:flex-none bg-dark-800 border border-dark-700 rounded-lg px-3 md:px-4 py-2.5 md:py-3 text-white focus:border-blue-500 focus:shadow-lg focus:shadow-blue-500/20 text-sm md:text-base transition">
              <option value="medium">Priority</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
            <button id="addTaskBtn" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white px-4 md:px-8 py-2.5 md:py-3 rounded-lg font-semibold transition shadow-lg hover:shadow-xl text-sm md:text-base whitespace-nowrap">+ Add Task</button>
          </div>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
